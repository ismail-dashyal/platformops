        /* CSS Reset & Variables */
        :root {
            --bg-sidebar: #f7f7f8;      
            --bg-main: #ffffff;         
            --text-main: #000000;       
            --text-muted: #444746;      /* Slightly darker for better readability */
            --accent-bg: #e3e3e3;       /* Highlight color matching the screenshot */
            --accent-text: #1f1f1f;     
            --border: #e5e5e5;          
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden; /* Prevents the main window from scrolling */
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            flex-shrink: 0;
        }

        .logo-section {
            padding: 1rem 0.5rem 1.5rem 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-section h1 {
            font-size: 1.25rem;
            font-weight: 500;
        }

        .logo-section span {
            color: #0b57d0; /* Blue accent for Ops */
        }

        /* Navigation List */
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto; 
        }

        .nav-section-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 1rem 0 0.5rem 0.5rem;
            font-weight: 500;
        }

        .nav-item {
            display: flex;
            align-items: center; /* Centered for a single line look */
            gap: 12px;
            padding: 10px 16px;
            border-radius: 50px; /* Pill shape like the screenshot */
            text-decoration: none;
            color: var(--text-main);
            transition: background-color 0.2s ease-in-out;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: rgba(0, 0, 0, 0.04);
        }

        /* Active state for the clicked tab */
        .nav-item.active {
            background-color: var(--accent-bg);
            font-weight: 500;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .nav-item.active .nav-icon {
            color: var(--text-main);
        }

        .nav-title {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Adds ... if text is too long */
        }

        /* Submenu styles */
        .nav-group {
            display: flex;
            flex-direction: column;
        }

        .sub-menu {
            display: none;
            margin-left: 1.5rem;
            margin-top: 4px;
        }

        .nav-group.open .sub-menu {
            display: block;
        }

        .nav-item.sub-item {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.88rem;
        }

        .nav-chev {
            margin-left: auto;
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }
        /* --- Main Content Area --- */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
        }

        /* The iframe acts as the window for your right-side content */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

    <script>
        const navItems = document.querySelectorAll('.nav-item');

        navItems.forEach(item => {
            item.addEventListener('click', function(e) {
                // Clear active state from all items
                navItems.forEach(nav => nav.classList.remove('active'));

                // If this is a parent item, toggle its submenu instead of navigating
                if (this.classList.contains('nav-parent')) {
                    e.preventDefault();
                    const group = this.parentElement;
                    // Close other groups
                    document.querySelectorAll('.nav-group').forEach(g => {
                        if (g !== group) g.classList.remove('open');
                    });
                    group.classList.toggle('open');
                    this.classList.add('active');
                    return;
                }

                // For regular items (including sub-items), activate and ensure parent is open
                this.classList.add('active');
                const group = this.closest('.nav-group');
                if (group) {
                    document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
                    group.classList.add('open');
                    const parentLink = group.querySelector('.nav-parent');
                    if (parentLink) parentLink.classList.add('active');
                }
            });
        });
    </script>
